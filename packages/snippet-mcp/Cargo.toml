[package]
name = "snippet-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP server exposing markdown snippets as searchable tools for the executor MCP."
license = "MIT"

[[bin]]
name = "snippet-mcp"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1.6", features = [
  "server",
  "transport-streamable-http-server",
  "transport-io",
] }
axum = "0.8"
tokio = { version = "1", features = [
  "macros",
  "rt-multi-thread",
  "io-std",
  "signal"
] }
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
reqwest = { version = "0.13", default-features = false, features = [
  "rustls",
  "json"
] }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
