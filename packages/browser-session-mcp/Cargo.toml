[package]
name = "browser-session-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP server giving each caller an isolated browser session against a shared persistent Chrome."
license = "MIT"

[[bin]]
name = "browser-session-mcp"
path = "src/main.rs"

[[bin]]
name = "browser-session-listener"
path = "src/bin/listener.rs"

[[bin]]
name = "browser-session-reaper"
path = "src/bin/reaper.rs"

[[bin]]
name = "browser-session-takeover"
path = "src/bin/takeover.rs"

[dependencies]
rmcp = { version = "1.6", features = ["server", "transport-io"] }
chromiumoxide = { version = "0.9", default-features = false }
futures = "0.3"
tokio = { version = "1", features = [
  "macros",
  "rt-multi-thread",
  "io-std",
  # "net" + "io-util": the takeover daemon's tiny HTTP server (TcpListener +
  # AsyncRead/Write). All other binaries ignore them.
  "net",
  "io-util",
  "signal",
  "fs",
  "sync",
  "time",
] }
# Random takeover tokens. Pinned to the 0.2 line already present in Cargo.lock
# (transitively, via rustls) so adding it as a direct dep needs no lock regen.
getrandom = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
regex = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# TLS is required: production BROWSER_URL is https://chrome.<domain> behind
# Traefik (Chrome itself binds 127.0.0.1:9222, so the mcp-proxy container has
# no plaintext route to it). We need TLS for both reqwest (/json/version
# probe) and for async-tungstenite (the wss:// CDP upgrade) — the latter is
# pulled in transitively by chromiumoxide and we activate its TLS feature
# by adding it as a direct dep here.
reqwest = { version = "0.13", default-features = false, features = [
  "json",
  "rustls",
] }
async-tungstenite = { version = "0.32", default-features = false, features = [
  "tokio-runtime",
  "tokio-rustls-webpki-roots",
] }
url = "2"
base64 = "0.22"
time = { version = "0.3", features = ["formatting", "parsing", "macros"] }
once_cell = "1"

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
