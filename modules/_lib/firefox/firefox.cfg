// PDF tab favicons (Firefox autoconfig script).
// First line MUST be a comment — the autoconfig parser skips it.
// Requires general.config.sandbox_enabled = false (set by autoconfig.js) so this
// runs with chrome privileges and can call gBrowser.setIcon. That flag governs
// the privilege of THIS file only; it does not touch the web content sandbox.
//
// Behaviour: tabs that Firefox leaves with the generic globe get a fitting glyph
// instead — PDFs, view-source, JSON, plain text, and local files/folders.

try {
  const Ci = Components.interfaces;

  // The icon catalog + resolver lives in favicon-icons.js (sibling of this file
  // in the app's Resources dir, symlinked there by the home-manager activation).
  // Load it as a subscript: its top-level `var pickFaviconIcon` attaches to the
  // scope object we pass in. If loading fails, pickIcon degrades to a no-op so
  // the dark-favicon detection below still runs.
  let pickIcon = () => null;
  try {
    const iconExports = {};
    const iconsFile = Services.dirsvc.get("GreD", Ci.nsIFile);
    iconsFile.append("favicon-icons.js");
    Services.scriptloader.loadSubScript(
      Services.io.newFileURI(iconsFile).spec,
      iconExports,
    );
    if (typeof iconExports.pickFaviconIcon === "function") {
      pickIcon = iconExports.pickFaviconIcon;
    }
  } catch (e) {
    Components.utils.reportError("[pdf-favicon] failed to load icons: " + e);
  }

  // setIcon's signature has shifted across Firefox versions; try the known
  // variants (newest first) until one sticks.
  function setTabIcon(gBrowser, tab, icon) {
    const sysp = Services.scriptSecurityManager.getSystemPrincipal();
    try {
      gBrowser.setIcon(tab, icon, icon, sysp);
      return;
    } catch (e) {}
    try {
      gBrowser.setIcon(tab, icon, sysp);
      return;
    } catch (e) {}
    try {
      gBrowser.setIcon(tab, icon);
    } catch (e) {}
  }

  function maybeApply(gBrowser, browser) {
    try {
      const tab = gBrowser.getTabForBrowser(browser);
      if (!tab) return;
      const icon = pickIcon(browser);
      if (icon) setTabIcon(gBrowser, tab, icon);
    } catch (e) {}
  }

  // ---- Dark favicon detection -----------------------------------------------
  // Near-black favicons are hard to see on a dark theme. Sample the icon's
  // pixels; if it's predominantly dark, tag the tab with [darkfavicon] and let
  // userChrome.css invert it. Cross-origin reads are fine here: a chrome-context
  // fetch runs with the system principal, and decoding via a same-origin blob
  // avoids canvas taint.
  const DARK_LUMA_THRESHOLD = 0.22; // mean luminance (0..1); below => "dark"
  const ALPHA_MIN = 32; // ignore near-transparent pixels when averaging

  // Rasterize the favicon to a 32x32 canvas and return its 2d context, or null.
  async function rasterize(win, iconURL) {
    const resp = await win.fetch(iconURL);
    let blob = await resp.blob();

    // SVG favicons commonly declare only a viewBox with no width/height, so they
    // decode at zero size. Give those a concrete raster size before decoding.
    if (/svg/i.test(blob.type) || /\.svg(?:[?#]|$)/i.test(iconURL)) {
      let text = await blob.text();
      if (!/<svg[^>]*\s(?:width|height)=/i.test(text)) {
        text = text.replace(/<svg\b/i, '<svg width="32" height="32"');
      }
      blob = new win.Blob([text], { type: "image/svg+xml" });
    }

    const w = 32;
    const h = 32;
    const canvas = new win.OffscreenCanvas(w, h);
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    // Primary path: createImageBitmap.
    try {
      const bmp = await win.createImageBitmap(blob);
      if (bmp.width && bmp.height) {
        ctx.drawImage(bmp, 0, 0, w, h);
        return ctx;
      }
    } catch (e) {}

    // Fallback: some SVG blobs are rejected by createImageBitmap; rasterize via
    // an <img> element at a fixed size instead.
    const objURL = win.URL.createObjectURL(blob);
    try {
      const img = new win.Image();
      img.width = w;
      img.height = h;
      img.src = objURL;
      await img.decode();
      ctx.drawImage(img, 0, 0, w, h);
      return ctx;
    } catch (e) {
      return null;
    } finally {
      win.URL.revokeObjectURL(objURL);
    }
  }

  async function isIconDark(win, iconURL) {
    const ctx = await rasterize(win, iconURL);
    if (!ctx) return false;
    const { data } = ctx.getImageData(0, 0, 32, 32);
    let sum = 0;
    let n = 0;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] < ALPHA_MIN) continue;
      sum +=
        (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) / 255;
      n++;
    }
    return n >= 4 && sum / n < DARK_LUMA_THRESHOLD;
  }

  function updateDarkFavicon(win, gBrowser, tab) {
    let iconURL;
    try {
      iconURL = gBrowser.getIcon(tab) || tab.getAttribute("image");
    } catch (e) {}
    if (!iconURL) {
      tab.removeAttribute("darkfavicon");
      return;
    }
    isIconDark(win, iconURL)
      .then((dark) => {
        if (dark) tab.setAttribute("darkfavicon", "true");
        else tab.removeAttribute("darkfavicon");
      })
      .catch(() => {});
  }

  function attach(win) {
    const gBrowser = win.gBrowser;
    if (!gBrowser || !gBrowser.addTabsProgressListener) return;
    gBrowser.addTabsProgressListener({
      onLocationChange(browser, webProgress) {
        try {
          if (webProgress && !webProgress.isTopLevel) return;
        } catch (e) {}
        maybeApply(gBrowser, browser);
      },
      // Re-apply on load completion: Firefox's "no favicon -> default globe"
      // fallback can clobber an icon set during onLocationChange.
      onStateChange(browser, webProgress, request, stateFlags) {
        const done =
          stateFlags & Ci.nsIWebProgressListener.STATE_STOP &&
          stateFlags & Ci.nsIWebProgressListener.STATE_IS_WINDOW;
        if (done) maybeApply(gBrowser, browser);
      },
    });

    // Re-check the dark/light tag whenever a tab's favicon changes, plus once
    // for each tab already present (restored sessions, already-open windows).
    gBrowser.tabContainer.addEventListener("TabAttrModified", (e) => {
      const changed = e.detail && e.detail.changed;
      if (changed && changed.includes("image")) {
        updateDarkFavicon(win, gBrowser, e.target);
      }
    });
    for (const tab of gBrowser.tabs) updateDarkFavicon(win, gBrowser, tab);
  }

  function onWindowOpened(win) {
    win.addEventListener(
      "load",
      () => {
        if (
          win.document.documentElement.getAttribute("windowtype") ===
          "navigator:browser"
        ) {
          attach(win);
        }
      },
      { once: true },
    );
  }

  Services.ww.registerNotification({
    observe(subject, topic) {
      if (topic === "domwindowopened") onWindowOpened(subject);
    },
  });

  // Defensive: attach to any browser window already open when this runs.
  const en = Services.wm.getEnumerator("navigator:browser");
  while (en.hasMoreElements()) attach(en.getNext());
} catch (e) {
  try {
    Components.utils.reportError("[pdf-favicon] " + e);
  } catch (_) {}
}

// ---- PiP mover --------------------------------------------------------------
// The Picture-in-Picture mover (loopback listener + hold-to-scale animation) is
// authored in TypeScript and bundled to pip-mover.js (packages/firefox-pip-mover),
// symlinked beside this file in the app's Resources dir by the home-manager
// firefox activation. Load it as a chrome subscript so it runs privileged, the
// same way favicon-icons.js is loaded above.
try {
  const Ci = Components.interfaces;
  const f = Services.dirsvc.get("GreD", Ci.nsIFile);
  f.append("pip-mover.js");
  // Pass the chrome globals the bundle needs explicitly via the scope object,
  // so it doesn't depend on free-variable fall-through to the autoconfig global.
  Services.scriptloader.loadSubScript(Services.io.newFileURI(f).spec, {
    Components,
    Services,
  });
} catch (e) {
  try {
    Components.utils.reportError("[pip-mover] load: " + e);
  } catch (_) {}
}
