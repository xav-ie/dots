state_file = "auto"

[hotkey]
# Hotkey handled by Hyprland keybinding instead of evdev
enabled = false

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

[whisper]
model = "large-v3-turbo"
language = "en"
translate = false
gpu_device = 0

[output]
mode = "type"
fallback_to_clipboard = true
driver_order = ["wtype", "clipboard"]
type_delay_ms = 0

[vad]
enabled = true
threshold = 0.5
min_speech_duration_ms = 100

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = true
